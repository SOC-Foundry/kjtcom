name: kjtcom
description: "Multi-pipeline location intelligence platform - kylejeromethompson.com"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  flutter_riverpod: ^3.3.1
  google_fonts: ^8.0.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  web: ^1.1.1
  flutter_code_editor: ^0.3.5
  highlight: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/globe_hero.jpg
    - assets/value_index.json
    - assets/middleware_registry.json
    - assets/gotcha_archive.json

  fonts:
    - family: GeistSans
      fonts:
        - asset: assets/fonts/Geist-Regular.ttf
          weight: 400
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
    - family: GeistMono
      fonts:
        - asset: assets/fonts/GeistMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/GeistMono-Medium.ttf
          weight: 500
