<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw3D - PCB Architecture</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0D1117; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        #ui-container {
            position: absolute; top: 16px; left: 16px; z-index: 100;
            color: #4ADE80; pointer-events: none;
        }
        #ui-container * { pointer-events: auto; }
        h1 { font-size: 22px; margin-bottom: 4px; text-shadow: 0 0 10px rgba(74, 222, 128, 0.5); }
        .subtitle { color: #8B949E; font-size: 13px; margin-bottom: 16px; }
        .controls {
            display: flex; align-items: center; gap: 12px;
            background: rgba(22, 27, 34, 0.8); padding: 8px 12px;
            border-radius: 8px; border: 1px solid #30363D;
        }
        label { font-size: 14px; color: #C9D1D9; }
        select {
            background: #21262D; color: #C9D1D9; border: 1px solid #30363D;
            padding: 4px 8px; border-radius: 4px; outline: none; cursor: pointer;
        }
        button {
            background: #21262D; color: #C9D1D9; border: 1px solid #30363D;
            padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 13px;
        }
        button:hover { border-color: #4ADE80; }
        #btn-all-boards { display: none; }

        #tooltip {
            position: absolute; display: none; z-index: 1000;
            background: rgba(22, 27, 34, 0.95); border: 1px solid #4ADE80;
            color: #C9D1D9; padding: 10px 14px; border-radius: 6px;
            font-family: 'Courier New', monospace; font-size: 12px;
            pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 300px; line-height: 1.5;
        }

        #legend {
            position: absolute; bottom: 16px; left: 16px; z-index: 100;
            color: #C9D1D9; font-size: 11px; line-height: 1.6;
            background: rgba(22, 27, 34, 0.8); padding: 12px;
            border-radius: 8px; border: 1px solid #30363D;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

        .loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0D1117; display: flex; justify-content: center;
            align-items: center; color: #4ADE80; font-size: 20px; z-index: 9999;
        }

        .label-overlay {
            position: absolute; color: #8B949E; font-family: 'Courier New', monospace;
            font-size: 10px; pointer-events: none; white-space: nowrap;
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
        }
        .label-overlay.board-label {
            font-size: 13px; color: #C9D1D9; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">Loading PCB Architecture...</div>

    <div id="ui-container">
        <h1>Claw3D Architecture</h1>
        <p class="subtitle">v10.56 | PCB Architecture</p>
        <div class="controls">
            <label for="iteration-select">Iteration:</label>
            <select id="iteration-select"></select>
            <button id="btn-all-boards">All boards</button>
        </div>
    </div>

    <div id="legend">
        <div class="legend-item"><span class="legend-dot" style="background:#4ADE80"></span> Active</div>
        <div class="legend-item"><span class="legend-dot" style="background:#EF9F27"></span> Degraded</div>
        <div class="legend-item"><span class="legend-dot" style="background:#666666"></span> Inactive</div>
    </div>

    <div id="tooltip"></div>
    <div id="label-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    (function() {
        'use strict';

        // --- Constants ---
        var STATUS_COLORS = { active: 0x4ADE80, degraded: 0xEF9F27, inactive: 0x666666 };
        var STATUS_HEX = { active: '#4ADE80', degraded: '#EF9F27', inactive: '#666666' };
        var BG_COLOR = 0x0D1117;
        var CHIP_COLOR = 0x1F2937;
        var BOARD_Y = { frontend: 3, middleware: 0, backend: -3 };
        var CHIP_X = [-4.5, -1.5, 1.5, 4.5];
        var CHIP_Z = [-0.8, 0.8];

        // Camera targets
        var OVERVIEW = { pos: new THREE.Vector3(0, 5, 14), lookAt: new THREE.Vector3(0, 0, 0) };
        var ZOOM_TARGETS = {
            frontend:   { pos: new THREE.Vector3(0, 6, 6),  lookAt: new THREE.Vector3(0, 3, 0) },
            middleware:  { pos: new THREE.Vector3(0, 3, 6),  lookAt: new THREE.Vector3(0, 0, 0) },
            backend:    { pos: new THREE.Vector3(0, 0, 6),  lookAt: new THREE.Vector3(0, -3, 0) }
        };

        // State
        var boardData = null;
        var iterationData = null;
        var chipMeshes = [];
        var boardMeshes = [];
        var chipDataMap = new Map();
        var boardDataMap = new Map();
        var dashedLines = [];
        var labelElements = [];
        var cameraTarget = { pos: OVERVIEW.pos.clone(), lookAt: OVERVIEW.lookAt.clone() };
        var currentLookAt = OVERVIEW.lookAt.clone();
        var zoomedBoard = null;

        // --- Scene Setup ---
        var scene = new THREE.Scene();
        scene.background = new THREE.Color(BG_COLOR);

        var camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
        camera.position.copy(OVERVIEW.pos);

        var renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        var raycaster = new THREE.Raycaster();
        var mouse = new THREE.Vector2();
        var tooltip = document.getElementById('tooltip');
        var labelContainer = document.getElementById('label-container');

        // --- Helpers ---
        function hexToThreeColor(hex) {
            return new THREE.Color(hex);
        }

        function createLabel(text, isBoard) {
            var div = document.createElement('div');
            div.className = 'label-overlay' + (isBoard ? ' board-label' : '');
            div.textContent = text;
            labelContainer.appendChild(div);
            return div;
        }

        // --- Build Scene ---
        function buildScene() {
            var boards = boardData.boards;
            var connectors = boardData.connectors;

            boards.forEach(function(board) {
                var yPos = BOARD_Y[board.id];
                var boardColor = hexToThreeColor(board.color);

                // Board plane
                var planeGeo = new THREE.PlaneGeometry(12, 4);
                var planeMat = new THREE.MeshBasicMaterial({
                    color: 0x0D1117, side: THREE.DoubleSide, transparent: true, opacity: 0.8
                });
                var planeMesh = new THREE.Mesh(planeGeo, planeMat);
                planeMesh.rotation.x = -Math.PI / 2;
                planeMesh.position.set(0, yPos, 0);
                scene.add(planeMesh);
                boardMeshes.push(planeMesh);
                boardDataMap.set(planeMesh.uuid, board.id);

                // Board border
                var edgesGeo = new THREE.EdgesGeometry(planeGeo);
                var edgesMat = new THREE.LineBasicMaterial({ color: boardColor });
                var edges = new THREE.LineSegments(edgesGeo, edgesMat);
                edges.rotation.x = -Math.PI / 2;
                edges.position.set(0, yPos + 0.01, 0);
                scene.add(edges);

                // Board label
                var boardLabel = createLabel(board.label, true);
                boardLabel._worldPos = new THREE.Vector3(0, yPos + 0.2, -2.3);
                boardLabel.style.color = board.color;
                labelElements.push(boardLabel);

                // Intra-board bus traces (horizontal lines through both rows)
                var busColor = boardColor.clone();
                var busMat = new THREE.LineBasicMaterial({ color: busColor, transparent: true, opacity: 0.25 });
                CHIP_Z.forEach(function(z) {
                    var busPoints = [
                        new THREE.Vector3(-5.5, yPos + 0.06, z),
                        new THREE.Vector3(5.5, yPos + 0.06, z)
                    ];
                    var busGeo = new THREE.BufferGeometry().setFromPoints(busPoints);
                    var busLine = new THREE.Line(busGeo, busMat);
                    scene.add(busLine);
                });

                // Chips
                board.components.forEach(function(comp, idx) {
                    var col = idx % 4;
                    var row = Math.floor(idx / 4);
                    var cx = CHIP_X[col];
                    var cz = CHIP_Z[row];
                    var cy = yPos + 0.06;

                    // Chip body
                    var chipColor = comp.color ? hexToThreeColor(comp.color) : new THREE.Color(CHIP_COLOR);
                    var chipGeo = new THREE.BoxGeometry(1.2, 0.1, 0.7);
                    var chipMat = new THREE.MeshBasicMaterial({ color: chipColor });
                    var chipMesh = new THREE.Mesh(chipGeo, chipMat);
                    chipMesh.position.set(cx, cy, cz);
                    scene.add(chipMesh);
                    chipMeshes.push(chipMesh);
                    chipDataMap.set(chipMesh.uuid, {
                        id: comp.id,
                        label: comp.label,
                        status: comp.status,
                        detail: comp.detail,
                        boardId: board.id,
                        boardColor: board.color
                    });

                    // LED indicator (top-right corner)
                    var ledGeo = new THREE.SphereGeometry(0.05, 8, 8);
                    var ledColor = STATUS_COLORS[comp.status] || STATUS_COLORS.inactive;
                    var ledMat = new THREE.MeshBasicMaterial({ color: ledColor });
                    var ledMesh = new THREE.Mesh(ledGeo, ledMat);
                    ledMesh.position.set(cx + 0.5, cy + 0.06, cz - 0.25);
                    scene.add(ledMesh);

                    // Pin arrays (small lines extending from chip edges)
                    var pinMat = new THREE.LineBasicMaterial({ color: 0x555555 });
                    var pinLen = 0.15;
                    // Left and right pins
                    for (var p = 0; p < 4; p++) {
                        var pz = cz - 0.25 + p * 0.15;
                        // Left pins
                        var lpGeo = new THREE.BufferGeometry().setFromPoints([
                            new THREE.Vector3(cx - 0.6, cy, pz),
                            new THREE.Vector3(cx - 0.6 - pinLen, cy, pz)
                        ]);
                        scene.add(new THREE.Line(lpGeo, pinMat));
                        // Right pins
                        var rpGeo = new THREE.BufferGeometry().setFromPoints([
                            new THREE.Vector3(cx + 0.6, cy, pz),
                            new THREE.Vector3(cx + 0.6 + pinLen, cy, pz)
                        ]);
                        scene.add(new THREE.Line(rpGeo, pinMat));
                    }

                    // Chip label
                    var chipLabel = createLabel(comp.label, false);
                    chipLabel._worldPos = new THREE.Vector3(cx, cy + 0.15, cz);
                    labelElements.push(chipLabel);
                });
            });

            // Inter-board connectors (animated dashed lines with L-bends)
            connectors.forEach(function(conn, idx) {
                var fromY = BOARD_Y[conn.from];
                var toY = BOARD_Y[conn.to];
                var connColor = hexToThreeColor(conn.color);

                // Spread connectors horizontally to avoid overlap
                var count = connectors.filter(function(c) { return c.from === conn.from && c.to === conn.to; }).length;
                var sameGroup = connectors.filter(function(c) { return c.from === conn.from && c.to === conn.to; });
                var groupIdx = sameGroup.indexOf(conn);
                var spread = 2.0;
                var xOffset = (groupIdx - (count - 1) / 2) * spread;

                // L-bend routing: go down from source, then across
                var midY = (fromY + toY) / 2;
                var points = [
                    new THREE.Vector3(xOffset, fromY - 0.05, 0),
                    new THREE.Vector3(xOffset, midY, 0),
                    new THREE.Vector3(xOffset, toY + 0.05, 0)
                ];

                var lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                var lineMat = new THREE.LineDashedMaterial({
                    color: connColor,
                    dashSize: 0.3,
                    gapSize: 0.15,
                    transparent: true,
                    opacity: 0.6
                });
                var line = new THREE.Line(lineGeo, lineMat);
                line.computeLineDistances();
                scene.add(line);
                dashedLines.push(line);

                // Connector label at midpoint
                var connLabel = createLabel(conn.label, false);
                connLabel._worldPos = new THREE.Vector3(xOffset + 0.15, midY, 0);
                connLabel.style.color = conn.color;
                connLabel.style.fontSize = '9px';
                labelElements.push(connLabel);
            });
        }

        // --- Iteration dropdown ---
        function populateIterations() {
            var select = document.getElementById('iteration-select');
            var keys = Object.keys(iterationData).reverse();
            keys.forEach(function(key, i) {
                var opt = document.createElement('option');
                opt.value = key;
                opt.textContent = key + (i === 0 ? ' (Current)' : '');
                select.appendChild(opt);
            });
            select.addEventListener('change', function() {
                applyIteration(select.value);
            });
        }

        function applyIteration(ver) {
            var val = iterationData[ver];
            if (!val) return;
            var showAll = (Array.isArray(val) && val[0] === 'ALL');

            chipMeshes.forEach(function(mesh) {
                var data = chipDataMap.get(mesh.uuid);
                if (!data) return;
                var visible = showAll || val.indexOf(data.id) !== -1;
                mesh.visible = visible;
            });
        }

        // --- Tooltip ---
        function updateTooltip(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            var intersects = raycaster.intersectObjects(chipMeshes);
            if (intersects.length > 0 && intersects[0].object.visible) {
                var data = chipDataMap.get(intersects[0].object.uuid);
                if (data) {
                    var statusDot = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' +
                        STATUS_HEX[data.status] + ';margin-right:6px;vertical-align:middle;"></span>';
                    tooltip.innerHTML =
                        '<div style="color:' + data.boardColor + ';font-weight:bold;margin-bottom:4px;">' + data.label + '</div>' +
                        '<div style="margin-bottom:4px;">' + statusDot + data.status + '</div>' +
                        '<div style="color:#8B949E;">' + data.detail + '</div>';
                    tooltip.style.display = 'block';

                    // Clamp to viewport
                    var tx = e.clientX + 15;
                    var ty = e.clientY + 15;
                    var tw = tooltip.offsetWidth;
                    var th = tooltip.offsetHeight;
                    if (tx + tw > window.innerWidth - 10) tx = e.clientX - tw - 15;
                    if (ty + th > window.innerHeight - 10) ty = e.clientY - th - 15;
                    tooltip.style.left = tx + 'px';
                    tooltip.style.top = ty + 'px';
                    return;
                }
            }
            tooltip.style.display = 'none';
        }

        // --- Click-to-zoom ---
        function handleClick(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            // Check chip click first (do nothing special on chip click - tooltip handles it)
            var chipHits = raycaster.intersectObjects(chipMeshes);
            if (chipHits.length > 0 && chipHits[0].object.visible) return;

            // Check board click
            var boardHits = raycaster.intersectObjects(boardMeshes);
            if (boardHits.length > 0) {
                var boardId = boardDataMap.get(boardHits[0].object.uuid);
                if (boardId && ZOOM_TARGETS[boardId]) {
                    zoomToBoard(boardId);
                }
            }
        }

        function zoomToBoard(boardId) {
            var target = ZOOM_TARGETS[boardId];
            cameraTarget.pos.copy(target.pos);
            cameraTarget.lookAt.copy(target.lookAt);
            zoomedBoard = boardId;
            document.getElementById('btn-all-boards').style.display = 'inline-block';
        }

        function zoomToOverview() {
            cameraTarget.pos.copy(OVERVIEW.pos);
            cameraTarget.lookAt.copy(OVERVIEW.lookAt);
            zoomedBoard = null;
            document.getElementById('btn-all-boards').style.display = 'none';
        }

        // --- Labels ---
        function updateLabels() {
            var halfW = window.innerWidth / 2;
            var halfH = window.innerHeight / 2;

            labelElements.forEach(function(el) {
                var pos = el._worldPos.clone();
                pos.project(camera);

                if (pos.z > 1) {
                    el.style.display = 'none';
                    return;
                }

                var sx = (pos.x * halfW) + halfW;
                var sy = -(pos.y * halfH) + halfH;
                el.style.display = 'block';
                el.style.left = sx + 'px';
                el.style.top = sy + 'px';
                el.style.transform = 'translate(-50%, -50%)';
            });
        }

        // --- Render Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Camera lerp
            camera.position.lerp(cameraTarget.pos, 0.05);
            currentLookAt.lerp(cameraTarget.lookAt, 0.05);
            camera.lookAt(currentLookAt);

            // Animate dashed line offsets
            dashedLines.forEach(function(line) {
                line.material.dashOffset -= 0.02;
            });

            // Update HTML label positions
            updateLabels();

            renderer.render(scene, camera);
        }

        // --- Events ---
        window.addEventListener('mousemove', updateTooltip);
        window.addEventListener('click', handleClick);

        document.getElementById('btn-all-boards').addEventListener('click', zoomToOverview);

        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && zoomedBoard) {
                zoomToOverview();
            }
        });

        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Load Data ---
        Promise.all([
            fetch('../../data/claw3d_components.json').then(function(r) { return r.json(); }),
            fetch('../../data/claw3d_iterations.json').then(function(r) { return r.json(); })
        ]).then(function(results) {
            boardData = results[0];
            iterationData = results[1];

            buildScene();
            populateIterations();
            applyIteration('v10.56');

            document.getElementById('loading').style.display = 'none';
            animate();
        }).catch(function(err) {
            console.error('Failed to load data:', err);
            document.getElementById('loading').textContent = 'Error loading data. Check console.';
        });

    })();
    </script>
</body>
</html>
