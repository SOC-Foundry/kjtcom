        - listitem [ref=e2369]:
          - generic [ref=e2370]:
            - button "What security measures does Monad employ to safeguard my security data?" [ref=e2371] [cursor=pointer]:
              - paragraph [ref=e2372]: What security measures does Monad employ to safeguard my security data?
              - img [ref=e2373]
            - paragraph [ref=e2377]: We prioritize data security through rigorous encryption standards. Data in transit is shielded using the latest TLS 1.3 or SSL protocols, while data at rest enjoys robust protection under individualized encryption keys for every customer. A hierarchical encryption key system further fortifies security with a key-encrypting key guarding the content-encrypting key. Additionally, a Hardware Security Module (HSM) oversees key management and safety, supplementing our secure infrastructure.
            - generic:
              - img
              - img
        - listitem [ref=e2378]:
          - generic [ref=e2379]:
            - button "Can Monad help me reduce SIEM costs?" [ref=e2380] [cursor=pointer]:
              - paragraph [ref=e2381]: Can Monad help me reduce SIEM costs?
              - img [ref=e2382]
            - paragraph [ref=e2386]: Yes. Monad helps reduce SIEM costs by optimizing data ingestion through advanced filtering, normalization, and routing capabilities. This ensures that your SIEM only receives high-value, actionable security data, significantly lowering ingestion volume and associated expenses.
            - generic:
              - img
              - img
        - listitem [ref=e2387]:
          - generic [ref=e2388]:
            - button "Why do security teams prefer Monad?" [ref=e2389] [cursor=pointer]:
              - paragraph [ref=e2390]: Why do security teams prefer Monad?
              - img [ref=e2391]
            - paragraph [ref=e2395]: Security teams appreciate Monad for significantly reducing the administrative burden involved in managing multiple tools and routing data, empowering them to focus on vital security initiatives and staying ahead of attackers. By assuming responsibility for your security data management, Monad allows teams to pivot to a proactive security stance, concentrating their efforts on critical areas and fostering a protective organizational environment.
            - generic:
              - img
              - img
        - listitem [ref=e2396]:
          - generic [ref=e2397]:
            - button "How is Monad different from a SIEM?" [ref=e2398] [cursor=pointer]:
              - paragraph [ref=e2399]: How is Monad different from a SIEM?
              - img [ref=e2400]
            - paragraph [ref=e2404]: Monad sits to the left of your SIEM—it's an ETL pipeline that ingests, normalizes, and enriches security data before sending it into your SIEM. By giving you greater control and flexibility over the data you feed your SIEM, Monad makes your SIEM more powerful and your security teams more effective. This enhances threat detection, reduces ingestion costs, and ensures your SIEM receives only high-value, actionable data.
            - generic:
              - img
              - img
        - listitem [ref=e2405]:
          - generic [ref=e2406]:
            - button "What is a Security Data Lake?" [ref=e2407] [cursor=pointer]:
              - paragraph [ref=e2408]: What is a Security Data Lake?
              - img [ref=e2409]
            - paragraph [ref=e2413]: A security data lake is a centralized repository that allows you to store, organize, and analyze a large volume of security data in its native format. It’s designed to hold a vast amount of data, ranging from structured data such as databases to unstructured data like plain text files. This data can be pulled from various sources, giving organizations the ability to analyze different data types comprehensively and cohesively. A security data lake leverages big data technologies to enable advanced analytics through machine learning and artificial intelligence to identify patterns and anomalies that traditional security solutions might miss.
            - generic:
              - img
              - img
        - listitem [ref=e2414]:
          - generic [ref=e2415]:
            - button "How does Monad work?" [ref=e2416] [cursor=pointer]:
              - paragraph [ref=e2417]: How does Monad work?
              - img [ref=e2418]
            - paragraph [ref=e2422]: Monad ingests security data from your security tools, then normalizes, filters, enriches, and routes it into your preferred data stores whether it be a SIEM, data lake or other solutions. Our ETL platform enables security teams to quickly detect and respond to threats. Monad can be deployed on-prem or as a SaaS application. To learn more about how Monad works, visit our "Platform" page linked in the navbar.
            - generic:
              - img
              - img
        - listitem [ref=e2423]:
          - generic [ref=e2424]:
            - button "What problem does Monad solve?" [ref=e2425] [cursor=pointer]:
              - paragraph [ref=e2426]: What problem does Monad solve?
              - img [ref=e2427]
            - paragraph [ref=e2431]: Monad solves the challenge of fragmented, high-volume security data. Security teams often face disjointed tools, inconsistent formats, and poor data quality that slow down detection and response. Monad unifies and transforms your security data by normalizing, filtering, and enriching it, so your team can act faster with accurate insights, reduce complexity, and focus on stopping threats.
            - generic:
              - img
